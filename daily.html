<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 대화 연습</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

<!-- 시작 모달 -->
<div id="startModal"
     class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">

    <div class="bg-slate-900 p-8 rounded-2xl w-[90%] max-w-md shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-6">
            누구랑 대화하시겠습니까?
        </h1>

        <div class="space-y-4">
            <div>
                <label class="block mb-2 text-slate-300">대상</label>
                <input
                    id="targetInput"
                    type="text"
                    placeholder="예) 친구, 선생님, 면접관"
                    class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block mb-2 text-slate-300">상황</label>
                <textarea
                    id="situationInput"
                    rows="3"
                    placeholder="예) 면접 연습, 진로 상담, 발표 준비"
                    class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500"></textarea>
            </div>

            <button
                onclick="startConversation()"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition">
                대화 시작
            </button>
        </div>
    </div>
</div>

<!-- 채팅 화면 -->
<div id="chatScreen" class="hidden h-screen flex flex-col">

    <!-- 상단 정보 -->
    <div class="bg-slate-900 border-b border-slate-800 p-4">
        <h2 class="text-xl font-bold">AI 대화 연습</h2>
        <p id="conversationInfo" class="text-slate-400 text-sm mt-1"></p>
    </div>

    <!-- 메시지 영역 -->
    <div id="chatMessages"
         class="flex-1 overflow-y-auto p-6 space-y-4">

        <div class="bg-slate-800 p-4 rounded-xl max-w-lg">
            안녕하세요! 대화를 시작해볼까요?
        </div>

    </div>

    <!-- 입력창 -->
    <div class="border-t border-slate-800 p-4">
        <div class="flex gap-3">
            <input
                id="messageInput"
                type="text"
                placeholder="메시지를 입력하세요..."
                class="flex-1 px-4 py-3 rounded-lg bg-slate-800 border border-slate-700">

            <button
                onclick="sendMessage()"
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg">
                전송
            </button>
        </div>
    </div>

</div>

<script>
function startConversation() {
    const target = document.getElementById("targetInput").value.trim();
    const situation = document.getElementById("situationInput").value.trim();

    if (!target || !situation) {
        alert("대상과 상황을 모두 입력해주세요.");
        return;
    }

    document.getElementById("startModal").classList.add("hidden");
    document.getElementById("chatScreen").classList.remove("hidden");

    document.getElementById("conversationInfo").textContent =
        `${target}와(과)의 대화 | 상황: ${situation}`;

    // AI 첫 인사
    const chat = document.getElementById("chatMessages");

    const aiMessage = document.createElement("div");
    aiMessage.className =
        "bg-slate-800 p-4 rounded-xl max-w-lg";

    aiMessage.textContent =
        `안녕하세요. 저는 ${target} 역할을 맡고 있습니다. (${situation}) 상황으로 대화를 시작해보겠습니다.`;

    chat.appendChild(aiMessage);
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if (!message) return;

    const chat = document.getElementById("chatMessages");

    // 사용자 메시지
    const userMsg = document.createElement("div");
    userMsg.className =
        "bg-blue-600 p-4 rounded-xl max-w-lg ml-auto";
    userMsg.textContent = message;

    chat.appendChild(userMsg);

    input.value = "";

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
