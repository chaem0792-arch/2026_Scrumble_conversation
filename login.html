<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Conversation — 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    .glow-card {
      box-shadow: 0 0 0 1px rgba(99,102,241,0.15), 0 32px 64px rgba(0,0,0,0.5);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      transition: all 0.2s ease;
      box-shadow: 0 4px 24px rgba(99,102,241,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(99,102,241,0.5);
    }
    .btn-primary:active { transform: translateY(0); }

    .input-field {
      background: rgba(30,41,59,0.8);
      border: 1.5px solid rgba(71,85,105,0.5);
      color: #f1f5f9;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input-field::placeholder { color: #64748b; }
    .input-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(71,85,105,0.4);
    }

    .social-btn {
      background: rgba(30,41,59,0.8);
      border: 1.5px solid rgba(71,85,105,0.4);
      transition: all 0.2s ease;
    }
    .social-btn:hover {
      border-color: rgba(99,102,241,0.5);
      background: rgba(30,41,59,1);
    }

    /* Ambient background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .checkbox-custom {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid rgba(71,85,105,0.6);
      border-radius: 5px;
      background: rgba(30,41,59,0.8);
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .checkbox-custom:checked {
      background: #6366f1;
      border-color: #6366f1;
    }
    .checkbox-custom:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    /* Password toggle button */
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #64748b;
      transition: color 0.2s;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .pw-toggle:hover { color: #94a3b8; }
  </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 overflow-hidden">

  <!-- Ambient blobs -->
  <div class="blob w-96 h-96 bg-indigo-600/20 top-[-80px] left-[-80px]"></div>
  <div class="blob w-80 h-80 bg-violet-600/15 bottom-[-60px] right-[-60px]"></div>
  <div class="blob w-64 h-64 bg-indigo-400/10 top-1/2 left-1/3 -translate-y-1/2"></div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md">

    <!-- Logo & Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-indigo-500 flex items-center justify-center text-2xl font-bold shadow-lg shadow-indigo-500/40 mb-4">
        AI
      </div>
      <h1 class="text-2xl font-bold text-white">AI 대화 연습</h1>
      <p class="text-slate-400 text-sm mt-1">실력을 키우는 가장 빠른 방법</p>
    </div>

    <!-- Card -->
    <div class="glow-card bg-slate-900/90 backdrop-blur-xl rounded-[32px] p-8">

      <h2 class="text-xl font-bold mb-1">로그인</h2>
      <p class="text-slate-400 text-sm mb-7">계정에 로그인하여 연습을 이어가세요</p>

      <!-- Form -->
      <div class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">이메일</label>
          <input
            type="email"
            placeholder="example@email.com"
            class="input-field w-full px-4 py-3 rounded-2xl text-sm"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">비밀번호</label>
          <div class="relative">
            <input
              id="pw-input"
              type="password"
              placeholder="비밀번호를 입력하세요"
              class="input-field w-full px-4 py-3 pr-12 rounded-2xl text-sm"
            />
            <button class="pw-toggle" onclick="togglePw()" type="button" aria-label="비밀번호 보기">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember & Forgot -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" class="checkbox-custom" />
            <span class="text-sm text-slate-400">로그인 상태 유지</span>
          </label>
          <button class="text-sm text-indigo-400 hover:text-indigo-300 transition">
            비밀번호 찾기
          </button>
        </div>

        <!-- Login Button -->
        <button
          class="btn-primary w-full py-3.5 rounded-2xl text-sm font-semibold mt-2"
          onclick="goToHome()"
        >
          로그인
        </button>

      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="divider-line"></div>
        <span class="text-xs text-slate-500 whitespace-nowrap">또는</span>
        <div class="divider-line"></div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-2 gap-3">

        <button class="social-btn rounded-2xl py-3 px-4 flex items-center justify-center gap-2 text-sm text-slate-300 font-medium">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <button class="social-btn rounded-2xl py-3 px-4 flex items-center justify-center gap-2 text-sm text-slate-300 font-medium">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          GitHub
        </button>

      </div>

      <!-- Sign up -->
      <p class="text-center text-sm text-slate-400 mt-6">
        계정이 없으신가요?
        <button class="text-indigo-400 hover:text-indigo-300 transition font-medium ml-1">
          회원가입
        </button>
      </p>

    </div>

    <!-- Footer note -->
    <p class="text-center text-xs text-slate-600 mt-6">
      로그인 시 이용약관 및 개인정보처리방침에 동의하게 됩니다.
    </p>

  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('pw-input');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    function goToHome() {
      // 이메일 입력값 가져오기
      const emailInput = document.querySelector('input[type="email"]');
      const email = emailInput ? emailInput.value.trim() : '';

      // 이메일에서 이름 추정 (@ 앞부분), 없으면 기본값
      const name = email ? email.split('@')[0] : '사용자';

      // 로그인 정보를 localStorage에 저장 → index.html에서 읽음
      localStorage.setItem('user', JSON.stringify({
        name: name,
        email: email || 'user@email.com',
        emoji: '😊'
      }));

      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
