<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 대화 연습 - 면접 대비</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #f4f6fa;
    color: #222;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 720px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e3e6ed;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 90vh;
  }

  /* 헤더 */
  .header {
    background: #2c3e7b;
    color: #fff;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
  }

  .header .category-badge {
    background: rgba(255,255,255,0.2);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
  }

  .back-btn {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .back-btn:hover {
    background: rgba(255,255,255,0.15);
  }

  /* 채팅 영역 */
  .chat-area {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    background: #fafbfc;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .message {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 15px;
    word-break: keep-all;
  }

  .message.ai {
    background: #fff;
    border: 1px solid #e3e6ed;
    align-self: flex-start;
    border-top-left-radius: 4px;
  }

  .message.user {
    background: #2c3e7b;
    color: #fff;
    align-self: flex-end;
    border-top-right-radius: 4px;
  }

  .message .label {
    font-size: 11px;
    opacity: 0.7;
    margin-bottom: 4px;
    display: block;
  }

  /* 피드백 박스 */
  .feedback {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-left: 4px solid #ffb300;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    color: #6d4c00;
    align-self: flex-start;
    max-width: 75%;
  }

  .feedback strong {
    display: block;
    margin-bottom: 4px;
    color: #b07800;
  }

  /* 입력창 */
  .input-area {
    border-top: 1px solid #e3e6ed;
    padding: 16px 20px;
    background: #fff;
  }

  .quick-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .quick-btn {
    background: #eef1f8;
    border: 1px solid #d6dcec;
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    color: #2c3e7b;
  }

  .quick-btn:hover {
    background: #dde3f2;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  .input-row input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid #d6dcec;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }

  .input-row input:focus {
    border-color: #2c3e7b;
  }

  .send-btn {
    background: #2c3e7b;
    color: #fff;
    border: none;
    padding: 0 22px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }

  .send-btn:hover {
    background: #1e2d5e;
  }

  .send-btn:disabled {
    background: #aaa;
    cursor: not-allowed;
  }

  /* 모바일 대응 */
  @media (max-width: 600px) {
    .container {
      height: 95vh;
    }
    .header h1 {
      font-size: 15px;
    }
    .message {
      max-width: 85%;
      font-size: 14px;
    }
  }
</style>
</head>
<body>
  <div class="container" role="main">
    <!-- 헤더 -->
    <div class="header">
      <button class="back-btn" onclick="alert('메인 화면으로 이동합니다.')" aria-label="뒤로 가기">← 뒤로</button>
      <h1>AI 면접관과 대화 연습</h1>
      <span class="category-badge">면접</span>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-area" id="chatArea" aria-live="polite">
      <div class="message ai">
        <span class="label">AI 면접관</span>
        안녕하세요. 면접 연습을 시작하겠습니다. 편한 마음으로 답변해 주세요.
      </div>
      <div class="message ai" id="questionBox">
        <span class="label">AI 면접관</span>
        <span id="questionText">자기소개 부탁드립니다.</span>
      </div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-area">
      <div class="quick-actions">
        <button class="quick-btn" onclick="changeQuestion()">다른 질문 받기</button>
        <button class="quick-btn" onclick="showHint()">답변 팁 보기</button>
        <button class="quick-btn" onclick="resetChat()">처음부터 다시</button>
      </div>
      <div class="input-row">
        <input
          type="text"
          id="userInput"
          placeholder="답변을 입력하세요..."
          aria-label="답변 입력"
          onkeydown="if(event.key==='Enter') sendMessage()"
        >
        <button class="send-btn" onclick="sendMessage()">전송</button>
      </div>
    </div>
  </div>

  <script>
    // 면접 질문 목록
    const interviewQuestions = [
      "자기소개 부탁드립니다.",
      "본인의 장점과 단점은 무엇인가요?",
      "왜 이 회사에 지원하셨나요?",
      "10년 후 본인의 모습은 어떨 것 같나요?",
      "팀워크 경험에 대해 말씀해 주세요."
    ];

    // 답변 팁
    const hints = [
      "구체적인 경험을 예시로 들어 보세요.",
      "두괄식으로 결론부터 말하면 좋아요.",
      "1분 내외로 간결하게 답변해 보세요.",
      "긍정적인 표현을 사용해 보세요."
    ];

    // AI 피드백 (랜덤)
    const feedbacks = [
      "답변이 명확하고 좋습니다. 조금 더 구체적인 예시를 들어보면 어떨까요?",
      "잘 답변하셨어요! 자신감 있는 말투가 인상적이에요.",
      "내용은 좋지만 조금 더 간결하게 정리해 보세요.",
      "면접관과의 시선 처리와 목소리 톤도 함께 신경 써 주세요."
    ];

    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    let currentQuestionIndex = 0;

    // 메시지 전송
    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      // 사용자 메시지 추가
      addMessage(text, 'user');
      userInput.value = '';

      // AI 피드백 (간단한 시뮬레이션)
      setTimeout(() => {
        addFeedback(feedbacks[Math.floor(Math.random() * feedbacks.length)]);

        // 다음 질문
        setTimeout(() => {
          currentQuestionIndex = (currentQuestionIndex + 1) % interviewQuestions.length;
          addMessage(interviewQuestions[currentQuestionIndex], 'ai', '다음 질문입니다.');
        }, 800);
      }, 600);
    }

    // 메시지 추가
    function addMessage(text, type, prefix) {
      const div = document.createElement('div');
      div.className = 'message ' + type;
      const label = type === 'ai' ? 'AI 면접관' : '나';
      div.innerHTML = `<span class="label">${label}</span>${prefix ? prefix + '<br>' : ''}${escapeHTML(text)}`;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // 피드백 추가
    function addFeedback(text) {
      const div = document.createElement('div');
      div.className = 'feedback';
      div.innerHTML = `<strong>AI 피드백</strong>${escapeHTML(text)}`;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // 다른 질문으로 변경
    function changeQuestion() {
      currentQuestionIndex = Math.floor(Math.random() * interviewQuestions.length);
      addMessage(interviewQuestions[currentQuestionIndex], 'ai', '새로운 질문이에요.');
    }

    // 힌트 표시
    function showHint() {
      const hint = hints[Math.floor(Math.random() * hints.length)];
      addFeedback('답변 팁: ' + hint);
    }

    // 채팅 초기화
    function resetChat() {
      if (!confirm('대화를 처음부터 다시 시작할까요?')) return;
      chatArea.innerHTML = `
        <div class="message ai">
          <span class="label">AI 면접관</span>
          안녕하세요. 면접 연습을 다시 시작하겠습니다.
        </div>
        <div class="message ai">
          <span class="label">AI 면접관</span>
          ${interviewQuestions[0]}
        </div>
      `;
      currentQuestionIndex = 0;
    }

    // XSS 방지용 간단한 이스케이프
    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[m]));
    }
  </script>
</body>
</html>
